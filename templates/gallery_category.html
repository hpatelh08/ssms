<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Gallery - {{ title }}</title>
  <link rel="stylesheet" href="/static/css/dashboard.css">
  <style>
    body { font-family: 'Poppins', sans-serif; background: #f7fafc; color:#2d3748; }
    .container { max-width:1100px; margin:40px auto; padding:20px; }
    .back { margin-bottom:18px; display:inline-block; color:#667eea; text-decoration:none }
    h1 { margin:0 0 20px 0 }
    .grid { display:grid; grid-template-columns: repeat(auto-fit,minmax(220px,1fr)); gap:18px }
    .thumb { background:#fff; border-radius:10px; padding:12px; box-shadow: 0 6px 20px rgba(0,0,0,0.06); text-align:center }
    .thumb img { max-width:100%; height:160px; object-fit:cover; border-radius:8px }
    .thumb .name { margin-top:10px; font-weight:600; color:#333 }
    .lightbox { position:fixed; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:3000 }
    .lightbox img { max-width:95%; max-height:90%; border-radius:8px }
    .lightbox .close { position:fixed; right:18px; top:14px; font-size:32px; color:#fff; cursor:pointer }
  </style>
</head>
<body>
  <div class="container">
    <a class="back" href="/visitor">← Back to Visitor Page</a>
    <h1>Gallery — {{ title }}</h1>

    {% if images and images|length > 0 %}
    <div class="grid">
      {% for img in images %}
      <div class="thumb" data-file="{{ img }}">
        <img src="/static/images/{{ img }}" alt="Gallery image">
      </div>
      {% endfor %}
    </div>
    {% else %}
      <p>No images found for this category.</p>
    {% endif %}
  </div>

  <div id="lightbox" class="lightbox">
    <span class="close" onclick="closeLightbox()">&times;</span>
    <img id="lightboxImg" src="" alt="">
  </div>

  <script>
    document.querySelectorAll('.thumb').forEach(t => {
      t.addEventListener('click', () => {
        const f = t.getAttribute('data-file');
        const src = '/static/images/' + f;
        document.getElementById('lightboxImg').src = src;
        document.getElementById('lightbox').style.display = 'flex';
      });
    });
    function closeLightbox(){ document.getElementById('lightbox').style.display = 'none'; document.getElementById('lightboxImg').src = ''; }
    document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closeLightbox(); });
  </script>
</body>
</html>
