<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Register</title>
  <style>body{font-family:Poppins, sans-serif;padding:40px;background:#f7fafc} .card{max-width:420px;margin:0 auto;background:#fff;padding:24px;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.06)} label{display:block;margin-top:12px} input{width:100%;padding:10px;margin-top:6px;border:1px solid #e6eef8;border-radius:6px} button{margin-top:16px;padding:12px 18px;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border:none;border-radius:8px;cursor:pointer}</style>
</head>
<body>
  <div class="card">
    <h2>Create Visitor Account</h2>
    <form method="post" action="/register">
      <label>Username<input name="username" required></label>
      <label>Password<input name="password" type="password" required></label>
      <label>Full name<input name="full_name" required></label>
      <label>Email<input name="email" type="email" required></label>
      <button type="submit">Register</button>
    </form>
    <p style="margin-top:12px">Already have an account? <a href="/">Login</a></p>
  </div>
</body>
</html>
