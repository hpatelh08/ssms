<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Exam Marks - Smart School System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-school"></i>
            <h2>Smart School</h2>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('teacher_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="{{ url_for('teacher_profile') }}"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="{{ url_for('add_attendance') }}"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a href="{{ url_for('today_homework') }}"><i class="fas fa-book-open"></i> Homework</a></li>
                <li class="active"><a href="#"><i class="fas fa-file-upload"></i> Marks</a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Upload Exam Marks - {{ class_assigned }}</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>Teacher</span>
            </div>
        </header>

        <div class="form-container" style="max-width: 800px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('exam_mark_upload') }}">
                <div class="form-group">
                    <label for="exam_name">Exam Name</label>
                    <input type="text" id="exam_name" name="exam_name" placeholder="e.g., Unit Test 1, Half Yearly" required>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject name" required>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Student ID</th>
                                <th>Student Name</th>
                                <th>Marks Obtained</th>
                                <th>Total Marks</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in students %}
                            <tr>
                                <td>{{ student[1] }}</td>
                                <td>{{ student[2] }}</td>
                                <td><input type="number" name="marks_{{ student[1] }}" min="0" max="100" step="0.01" placeholder="Obtained"></td>
                                <td><input type="number" name="total_{{ student[1] }}" min="1" max="100" step="0.01" value="100" placeholder="Total"></td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                <button type="submit" class="btn-submit">Upload Marks</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
