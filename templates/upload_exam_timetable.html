<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Exam Timetable - Smart School System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-school"></i>
            <h2>Smart School</h2>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('hod_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li class="active"><a href="#"><i class="fas fa-calendar-alt"></i> Exam Timetable</a></li>
                <li><a href="{{ url_for('teacher_progress') }}"><i class="fas fa-chalkboard-teacher"></i> Teacher Progress</a></li>
                <li><a href="{{ url_for('class_progress') }}"><i class="fas fa-users"></i> Class Progress</a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Upload Exam Timetable</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>HOD</span>
            </div>
        </header>

        <div class="form-container" style="max-width: 600px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('upload_exam_timetable') }}">
                <div class="form-group">
                    <label for="class">Class</label>
                    <select id="class" name="class" required>
                        <option value="">Select Class</option>
                        <option value="Class 8">Class 8</option>
                        <option value="Class 9">Class 9</option>
                        <option value="Class 10">Class 10</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject name" required>
                </div>

                <div class="form-group">
                    <label for="exam_date">Exam Date</label>
                    <input type="date" id="exam_date" name="exam_date" required>
                </div>

                <div class="form-group">
                    <label for="time_slot">Time Slot</label>
                    <input type="text" id="time_slot" name="time_slot" placeholder="e.g., 9:00 AM - 11:00 AM" required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" name="description" placeholder="Enter exam description" rows="3"></textarea>
                </div>

                <button type="submit" class="btn-submit">Upload Timetable</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
