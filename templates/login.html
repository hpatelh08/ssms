<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart School System - Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="login-box">
            <div class="logo">
                <i class="fas fa-school"></i>
                <h1>Smart School System</h1>
            </div>

            <div class="portal-selector">
                <button type="button" class="portal-btn active" onclick="showPortal('admin', event)">Admin</button>
                <button type="button" class="portal-btn" onclick="showPortal('teacher', event)">Teacher</button>
                <button type="button" class="portal-btn" onclick="showPortal('student', event)">Student</button>
            </div>

            <form method="POST" action="/login" id="loginForm">
                <input type="hidden" name="role" id="roleInput" value="admin">

                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" name="username" id="usernameInput" placeholder="Admin Email (e.g. admin001@admin.com)" required>
                </div>

                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" name="password" id="passwordInput" placeholder="Password" required>
                </div>

                {% if error %}
                <div class="error">{{ error }}</div>
                {% endif %}

                <button type="submit" class="login-btn">Login</button>
            </form>

            <div style="text-align: center; margin-top: 20px;">
                <a href="/visitor" style="color: #667eea; text-decoration: none; font-size: 14px; font-weight: 500;">
                    <i class="fas fa-eye"></i> Visit Our School
                </a>
            </div>
        </div>
    </div>

    <script>
        function showPortal(portal, event) {
            document.querySelectorAll('.portal-btn').forEach(btn => btn.classList.remove('active'));
            if (event && event.target) event.target.classList.add('active');

            document.getElementById('roleInput').value = portal;
            document.getElementById('passwordInput').value = '';

            const usernameInput = document.getElementById('usernameInput');
            if (portal === 'admin') {
                usernameInput.placeholder = 'Admin Email (e.g. admin001@admin.com)';
            } else if (portal === 'teacher') {
                usernameInput.placeholder = 'Teacher ID (e.g. teach8A)';
            } else {
                usernameInput.placeholder = 'Student ID (e.g. stu08A001)';
            }
        }
    </script>
</body>
</html>
