<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Attendance - Smart School System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-school"></i>
            <h2>Smart School</h2>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('teacher_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="{{ url_for('teacher_profile') }}"><i class="fas fa-user"></i> Profile</a></li>
                <li class="active"><a href="#"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a href="{{ url_for('today_homework') }}"><i class="fas fa-book-open"></i> Homework</a></li>
                <li><a href="{{ url_for('exam_mark_upload') }}"><i class="fas fa-file-upload"></i> Marks</a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Add Student Attendance - {{ class_assigned }}</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>Teacher</span>
            </div>
        </header>

        <div class="form-container" style="max-width: 800px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('add_attendance') }}">
                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date" value="{{ moment().format('YYYY-MM-DD') }}" required>
                </div>
                
                <input type="hidden" name="class_assigned" value="{{ class_assigned }}">

                <div class="table-container">
                    <table class="data-table" style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr>
                                <th>Roll No.</th>
                                <th>Student ID</th>
                                <th>Student Name</th>
                                <th>Attendance</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for student in students %}
                            <tr>
                                <td>{{ loop.index }}</td>
                                <td>{{ student[1] }}</td>
                                <td>{{ student[2] }}</td>
                                <td>
                                    <div style="display: flex; gap: 10px; justify-content: center;">
                                        <label style="display: flex; align-items: center; gap: 5px;">
                                            <input type="radio" name="attendance_{{ student[1] }}" value="present" checked> Present
                                        </label>
                                        <label style="display: flex; align-items: center; gap: 5px;">
                                            <input type="radio" name="attendance_{{ student[1] }}" value="absent"> Absent
                                        </label>
                                    </div>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

                <button type="submit" class="btn-submit">Mark Attendance</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
