<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assign Today's Homework - Smart School System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <div class="logo">
            <i class="fas fa-school"></i>
            <h2>Smart School</h2>
        </div>
        <nav>
            <ul>
                <li><a href="{{ url_for('teacher_dashboard') }}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a href="{{ url_for('teacher_profile') }}"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="{{ url_for('add_attendance') }}"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li class="active"><a href="#"><i class="fas fa-book-open"></i> Homework</a></li>
                <li><a href="{{ url_for('exam_mark_upload') }}"><i class="fas fa-file-upload"></i> Marks</a></li>
                <li><a href="{{ url_for('logout') }}"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </div>

    <div class="main-content">
        <header>
            <h1>Assign Today's Homework - {{ class_assigned }}</h1>
            <div class="user-info">
                <i class="fas fa-user-circle"></i>
                <span>Teacher</span>
            </div>
        </header>

        <div class="form-container" style="max-width: 600px; margin: 0 auto;">
            <form method="POST" action="{{ url_for('today_homework') }}">
                <div class="form-group">
                    <label for="class">Class</label>
                    <input type="text" id="class" name="class" value="{{ class_assigned }}" readonly>
                </div>

                <div class="form-group">
                    <label for="subject">Subject</label>
                    <input type="text" id="subject" name="subject" placeholder="Enter subject name" required>
                </div>

                <div class="form-group">
                    <label for="description">Homework Description</label>
                    <textarea id="description" name="description" placeholder="Enter homework details" rows="4" required></textarea>
                </div>

                <div class="form-group">
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date" required>
                </div>

                <button type="submit" class="btn-submit">Assign Homework</button>
            </form>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
