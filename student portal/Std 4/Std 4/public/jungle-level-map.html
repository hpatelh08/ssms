<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jungle Train Level Map (Demo)</title>
    <link rel="stylesheet" href="/jungle-level-map.css" />
  </head>
  <body>
    <div class="map" id="map">
      <!-- Fixed background -->
      <div class="background" aria-hidden="true"></div>

      <!-- Scrollable levels -->
      <div class="levels-viewport" role="region" aria-label="Scrollable level map">
        <div class="levels-container" id="levels"></div>
      </div>
    </div>

    <script type="module" src="/jungle-level-map.js"></script>
  </body>
</html>
