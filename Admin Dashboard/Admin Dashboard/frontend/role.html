<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Role Page — Smart School</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .role-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f8fafc;
      padding: 24px;
    }
    .role-card {
      background: #fff;
      border-radius: 14px;
      padding: 32px 36px;
      box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .role-title { font-size: 1.4rem; font-weight: 800; color: #0f172a; }
    .role-name { color: #4f46e5; }
    .role-sub { margin-top: 10px; color: #64748b; font-size: 0.95rem; }
    .role-actions { margin-top: 22px; display: flex; gap: 10px; justify-content: center; }
    .role-actions a {
      display: inline-block;
      padding: 10px 16px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.9rem;
    }
    .role-actions .btn-primary { background: #4f46e5; color: #fff; }
    .role-actions .btn-ghost { background: #eef2ff; color: #4f46e5; }
  </style>
</head>
<body>
  <div class="role-page">
    <div class="role-card">
      <div class="role-title">Welcome <span id="roleName" class="role-name">User</span></div>
      <div class="role-sub">This is a shared role page for non-admin users.</div>
      <div class="role-actions">
        <a class="btn-primary" href="index.html">Back to Login</a>
        <a class="btn-ghost" href="admin.html">Admin Panel</a>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
